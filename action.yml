name: 'Setup Apache Maven'
description: 'Download and set up a specific version of Apache Maven, adding it to PATH'
author: 'batmahdi'

branding:
  icon: 'package'
  color: 'red'

inputs:
  maven-version:
    description: 'The exact Maven version to install (e.g. 3.9.9, 4.0.0)'
    required: false
    default: '3.9.9'

outputs:
  maven-version:
    description: 'The Maven version that was installed'
  maven-path:
    description: 'The path where Maven was installed'

runs:
  using: 'node24'
  main: 'dist/index.js'
